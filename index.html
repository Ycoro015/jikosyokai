高橋
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>高橋のひみつ基地</title>
<style>
body {
    margin: 0;
    font-family: "Arial", sans-serif;
    background: linear-gradient(135deg, #89f7fe, #66a6ff);
    color: white;
    text-align: center;
}

header {
    padding: 40px;
    font-size: 40px;
    font-weight: bold;
    animation: float 3s ease-in-out infinite;
}

@keyframes float {
    0% { transform: translateY(0px); }
    50% { transform: translateY(-10px); }
    100% { transform: translateY(0px); }
}

.card {
    background: rgba(255,255,255,0.2);
    margin: 30px auto;
    padding: 30px;
    width: 60%;
    border-radius: 20px;
    backdrop-filter: blur(10px);
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
}

button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: #66a6ff;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    transform: scale(1.1);
    background: #ffdd57;
    color: black;
}

#secret {
    margin-top: 20px;
    font-size: 20px;
    display: none;
}
</style>
</head>

<body>

<header>
🚀 高橋のひみつ基地 🚀
</header>

<div class="card">
    <h2>こんにちは！</h2>
    <p>名前は <strong>高橋</strong> です。</p>
    <p>未来を作る人（予定）。</p>
    <p>好奇心レベル：★★★★★</p>

    <button onclick="showSecret()">秘密を見る</button>
    <div id="secret">
        🎉 実は…宇宙征服を企んでいます。（たぶん冗談）
    </div>
</div>

<script>
function showSecret() {
    document.getElementById("secret").style.display = "block";
}
</script>

</body>
</html>
